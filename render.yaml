# Render.com Blueprint - Auto-deploy configuration
# Deploy at: https://render.com/deploy

databases:
  - name: erp-db-production
    plan: starter
    databaseName: erp_production
    user: erp_user
    region: oregon

  - name: erp-db-testing
    plan: free
    databaseName: erp_testing
    user: erp_user
    region: oregon

services:
  # Production App
  - type: web
    name: erp-production
    plan: starter
    runtime: python
    region: oregon
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    startCommand: python manage.py migrate && gunicorn erp_system.wsgi:application --bind 0.0.0.0:$PORT --workers 4 --threads 2
    healthCheckPath: /health/
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: erp_system.settings_production
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: erp-production.onrender.com,tudominio.com,www.tudominio.com
      - key: DATABASE_URL
        fromDatabase:
          name: erp-db-production
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: ENVIRONMENT
        value: production

  # Testing App
  - type: web
    name: erp-testing
    plan: free
    runtime: python
    region: oregon
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    startCommand: python manage.py migrate && gunicorn erp_system.wsgi:application --bind 0.0.0.0:$PORT --workers 2
    healthCheckPath: /health/
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: erp_system.settings
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "True"
      - key: ALLOWED_HOSTS
        value: erp-testing.onrender.com,testing.tudominio.com
      - key: DATABASE_URL
        fromDatabase:
          name: erp-db-testing
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: ENVIRONMENT
        value: testing

  # Celery Worker
  - type: worker
    name: erp-celery-worker
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A erp_system worker -l info --concurrency=2
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: erp_system.settings_production
      - key: SECRET_KEY
        fromService:
          name: erp-production
          type: web
          envVarKey: SECRET_KEY
      - key: DATABASE_URL
        fromDatabase:
          name: erp-db-production
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: erp-redis
          type: redis
          property: connectionString

  # Redis
  - type: redis
    name: erp-redis
    plan: free
    region: oregon
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []
